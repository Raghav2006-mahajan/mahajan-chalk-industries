<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahajan Chalk Industries | Since 1953</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #ffffff;
    color: #000;
}

/* ================= HEADER ================= */

header {
    background: #0B3D2E;
    color: white;
    padding: 15px 8%;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
}

nav a:hover {
    color: #f4b400;
}

/* ================= HERO ================= */

.hero {
    position: relative;
    height: 100vh; /* Full screen height */
    overflow: hidden;
}

/* Image that auto fits all screens */
.hero-img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;      /* Auto crop properly */
    object-position: center; /* Keeps center safe */
}

/* Light overlay so buttons are visible */
.hero-overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.30);
}

/* Buttons container */
.hero-content {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
}

/* Buttons */
.btn {
    display: inline-block;
    padding: 16px 35px;
    margin: 10px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    font-size: 18px;
    color: white;
    transition: 0.3s ease;
}

.whatsapp-btn {
    background: #25D366;
}

.whatsapp-btn:hover {
    background: #1ebe5d;
}

.email-btn {
    background: #ff7a00;
}

.email-btn:hover {
    background: #e86c00;
}

/* ================= MOBILE RESPONSIVE ================= */

@media(max-width:768px) {

    header {
        flex-direction: column;
        align-items: flex-start;
    }

    nav a {
        display: block;
        margin: 5px 0;
    }

    .hero-content {
        bottom: 40px;
        width: 100%;
    }

    .btn {
        display: block;
        width: 80%;
        margin: 10px auto;
    }
}

</style>
</head>

<body>

<header>
    <h1>Mahajan Chalk Industries</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#products">Products</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero" id="home">

    <!-- HERO IMAGE -->
    <img src="hero-image.png" class="hero-img" alt="Mahajan Chalk Industries Banner">

    <div class="hero-overlay"></div>

    <div class="hero-content">
        <a href="https://wa.me/919876200666" target="_blank" class="btn whatsapp-btn">
            Chat on WhatsApp
        </a>

        <a href="mailto:mci.tmsc@gmail.com" class="btn email-btn">
            Email Us
        </a>
    </div>

</section>

</body>
</html>
